<!DOCTYPE html>
<html lang="en">

<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Signup Form</title>
 <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
 <style>
  *,
  *::before,
  *::after {
   margin: 0;
   padding: 0;
   box-sizing: border-box;
   font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  }

  body {
   min-height: 100vh;
   display: flex;
   justify-content: center;
   align-items: center;
   background: radial-gradient(circle at top, #6c5ce7, #1e1e2f);
   padding: 20px;
   /* overflow: hidden; */
  }

  .signupForm {
   width: 100%;
   max-width: 420px;
   background: rgba(255, 255, 255, 0.08);
   backdrop-filter: blur(12px);
   -webkit-backdrop-filter: blur(12px);
   border: 1px solid rgba(255, 255, 255, 0.15);
   border-radius: 16px;
   padding: 28px;
   display: flex;
   flex-direction: column;
   gap: 14px;
   box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
  }

  .signupForm>input {
   width: 100%;
   height: 48px;
   padding: 10px 14px;
   border-radius: 10px;
   border: 1px solid rgba(255, 255, 255, 0.2);
   background: rgba(255, 255, 255, 0.12);
   color: #fff;
   outline: none;
   transition: all 0.25s ease;
  }

  .signupForm>input::placeholder {
   color: rgba(255, 255, 255, 0.6);
  }

  .signupForm>input:focus {
   border-color: #a29bfe;
   box-shadow: 0 0 0 3px rgba(162, 155, 254, 0.25);
   transform: translateY(-1px);
  }

  .signupForm>button {
   height: 46px;
   border: none;
   border-radius: 10px;
   background: linear-gradient(135deg, #6c5ce7, #a29bfe);
   color: white;
   font-weight: 600;
   cursor: pointer;
   transition: all 0.2s ease;
  }

  .signupForm>button:hover {
   transform: translateY(-2px);
   box-shadow: 0 10px 20px rgba(0, 0, 0, 0.25);
  }

  .signupForm>button:active {
   transform: translateY(0);
  }

  .signupForm a {
   text-decoration: none;
   color: rgba(255, 255, 255, 0.8);
   font-size: 14px;
   text-align: center;
   transition: 0.2s;
  }

  .signupForm a:hover {
   color: #ffffff;
  }

  .succes {
   color: #00d084;
   display: none;
   width: 100%;
   text-align: center;
   font-weight: 600;
   margin-top: 4px;
   animation: fadeIn 0.3s ease-in-out;
  }

  @keyframes fadeIn {
   from {
    opacity: 0;
    transform: translateY(5px);
   }

   to {
    opacity: 1;
    transform: translateY(0);
   }
  }

  .formHeader {

   text-align: center;

   margin-bottom: 15px;
  }

  .formHeader h1 {

   color: white;

   font-size: 32px;

   font-weight: 700;

   letter-spacing: 1px;

   margin-bottom: 8px;
  }

  .formHeader p {

   color: rgba(255, 255, 255, .7);

   font-size: 14px;

   letter-spacing: .5px;
  }

  .developer {
   position: absolute;
   right: 40px;
   bottom: 35px;
   z-index: 999;
  }

  .developer-card {

   width: 170px;
   height: 170px;

   position: relative;

   display: flex;
   justify-content: center;
   align-items: center;
  }

  /* Glow */

  .glow {

   position: absolute;
   inset: 0;

   border-radius: 50%;

   background: rgba(99, 102, 241, .18);

   filter: blur(35px);

   transition: .6s;
  }

  /* Orbit */

  .orbit {

   position: absolute;

   inset: 0;

   border-radius: 50%;

   border: 1px solid rgba(99, 102, 241, .25);

   transition: .5s;
  }

  /* Profile */

  .profile {

   width: 110px;
   height: 110px;

   border-radius: 50%;

   overflow: hidden;

   border: 3px solid #6366f1;

   box-shadow:
    0 0 20px rgba(99, 102, 241, .4);

   transition: .5s;

   z-index: 5;
  }

  .profile img {

   width: 100%;
   height: 100%;

   object-fit: cover;

   transition: .5s;
  }

  /* Social Icons */

  .orbit a {

   width: 42px;
   height: 42px;

   border-radius: 50%;

   position: absolute;

   display: flex;
   justify-content: center;
   align-items: center;

   background: rgba(20, 20, 40, .95);

   backdrop-filter: blur(15px);

   border: 1px solid rgba(255, 255, 255, .12);

   color: white;

   font-size: 20px;

   text-decoration: none;

   opacity: 0;

   transform: scale(.2);

   transition: .45s;
  }

  .github {

   top: -20px;
   left: 50%;

   transform: translateX(-50%) scale(.2);
  }

  .linkedin {

   right: -20px;
   top: 50%;

   transform: translateY(-50%) scale(.2);
  }

  .instagram {

   left: 50%;
   bottom: -20px;

   transform: translateX(-50%) scale(.2);
  }

  .github:hover {

   color: #a5b4fc;
  }

  .linkedin:hover {

   color: #38bdf8;
  }

  .instagram:hover {

   color: #ec4899;
  }


  .developer-text {

   position: absolute;

   top: -40px;

   text-align: center;

   opacity: 0;

   transform: translateY(10px);

   transition: .4s;
  }

  .developer-text span {

   color: #a5b4fc;

   text-transform: uppercase;

   letter-spacing: 4px;

   font-size: 10px;
  }

  .developer-text h3 {

   margin-top: 6px;

   color: white;

   font-size: 16px;

   font-weight: 600;

   white-space: nowrap;
  }


  .developer-card:hover .orbit {
   animation: orbitRotate 8s linear infinite;
  }

  .developer-card:hover .profile {
   transform: scale(1.12);
  }

  .developer-card:hover .profile img {
   transform: scale(1.08);
  }

  .developer-card:hover .glow {
   transform: scale(1.3);
   background: rgba(99, 102, 241, .3);
  }

  .developer-card:hover .orbit a {
   opacity: 1;
  }

  .developer-card:hover .github {
   transform: translateX(-50%) scale(1);
  }

  .developer-card:hover .linkedin {
   transform: translateY(-50%) scale(1);
  }

  .developer-card:hover .instagram {
   transform: translateX(-50%) scale(1);
  }

  .developer-card:hover .developer-text {
   opacity: 1;
   transform: translateY(0);
  }


  @keyframes orbitRotate {

   from {

    transform: rotate(0deg);
   }

   to {

    transform: rotate(360deg);
   }
  }
 </style>
</head>

<body>
 <div class="signupForm">
  <div class="formHeader">

   <h1>API Login System</h1>

   <p>MockAPI • Cookies • CRUD Operations</p>

  </div>
  <input type="text" placeholder="User Name">
  <input type="email" placeholder="Email">
  <input type="password" placeholder="Password">
  <input type="tel" placeholder="phone Number">
  <button class="signup">SignUp!</button>
  <h2 class="succes">User got added!</h2>
  <a href="index2.html">Already have an account? Login!</a>
 </div>

 <footer class="developer">

  <div class="developer-card">

   <div class="glow"></div>

   <div class="orbit">

    <a href="https://github.com/FatemehSooki" target="_blank" class="github">
     <i class="bi bi-github"></i>
    </a>

    <a href="https://www.linkedin.com/in/fatemeh-sooki-197060396" target="_blank" class="linkedin">
     <i class="bi bi-linkedin"></i>
    </a>

    <a href="https://www.instagram.com/fatemeh_sooki" target="_blank" class="instagram">
     <i class="bi bi-instagram"></i>
    </a>

   </div>

   <div class="developer-text">

    <span>Developed By</span>

    <h3>Fatemeh Sooki</h3>

   </div>

   <div class="profile">

    <img src="5823194412169760388.jpg" alt="Developer">

   </div>


  </div>

 </footer>
</body>
<script>
 let btn1 = document.querySelector('.signup')
 let inp = document.querySelectorAll('.signupForm>input')
 const myToken = 'https://6a3f04049b6d371e83809332.mockapi.io/users'



 btn1.addEventListener('click', () => {
  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  const passwordRegex = /^(?=.*?[A-Z])(?=.*?[a-z])(?=.*?[0-9])(?=.*?[#?!@$%^&*-]).{8,}$/;
  const email = inp[1].value.trim();
  const password = inp[2].value.trim();

  if (!emailRegex.test(email)) {
   alert('Email format is not valid')
   return
  } else if (!passwordRegex.test(password)) {
   alert('password format s not valid')
   return
  }





  const user = {
   UserName: inp[0].value,
   Email: inp[1].value.trim(),
   Password: inp[2].value.trim(),
   Phone: inp[3].value
  };

  // checking if the user already excists//
  const url = new URL(myToken);
  url.searchParams.append('Email', user.Email);


  fetch(url, {
   method: 'GET',
   headers: { 'content-type': 'application/json' },
  }).then(res => {

   // console.log(res.status);
   // console.log(res.ok);


   if (res.ok) {
    return res.json();
   }

  }).then(data => {

   console.log(data);


   if (Array.isArray(data)) {
    alert('User already excists!')
   } else {
    adding(user)
   }

  }).catch(error => {
   console.log(error);

  })
  // checking if the user already excists//
 })



 // adding a user//
 function adding(user) {
  console.log(myToken)

  fetch(myToken, {
   method: 'POST',
   headers: { 'content-type': 'application/json' },
   // Send your data in the request body as JSON
   body: JSON.stringify(user)
  }).then(res => {
   if (res.ok) {
    return res.json();
   }

  }).then(task => {
   document.querySelector('.succes').style.display = 'block'
   setTimeout(() => {
    location.assign('index2.html')
   }, 2000);
  }).catch(error => {
   console.log(error);

  })
 }
</script>

</html>
